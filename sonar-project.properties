# =========================================================================
# sonar-project.properties
# Configuración del análisis de SonarCloud para el proyecto PIM5.
# =========================================================================
# Estos valores deben ajustarse a tu cuenta de SonarCloud antes del primer
# análisis. Ver instrucciones en el README o en la Etapa EX.D de la guía.

# Claves del proyecto y la organización en SonarCloud.
sonar.projectKey=cfgarciac_pim5-riesgo-crediticio
sonar.organization=cfgarciac

# Información descriptiva
sonar.projectName=PIM5 - Riesgo Crediticio
sonar.projectVersion=1.6.0

# Codificación de los archivos fuente
sonar.sourceEncoding=UTF-8

# Carpetas analizadas
sonar.sources=mlops_pipeline/src,streamlit_app.py
sonar.tests=tests

# Patrón de inclusión y exclusión
sonar.python.version=3.11
sonar.exclusions=**/__pycache__/**,**/*.ipynb,reports/**,artifacts/**

# Reporte de cobertura generado por pytest-cov
sonar.python.coverage.reportPaths=coverage.xml
