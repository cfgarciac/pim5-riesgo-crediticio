# =========================================================================
# .github/workflows/sonarcloud.yml
# Workflow de GitHub Actions que ejecuta las pruebas, genera el reporte
# de cobertura y envía el análisis a SonarCloud.
# =========================================================================
# Se dispara automáticamente en cada push o pull request a master,
# certification o developer.

name: SonarCloud Analysis

on:
  push:
    branches:
      - master
      - certification
      - developer
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      # 1. Descarga del código (con fetch-depth: 0 para que SonarCloud
      #    pueda calcular blame y métricas históricas).
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Configuración de Python.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instalación de dependencias del proyecto y de testing.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # 4. Ejecución de las pruebas con generación del reporte de cobertura
      #    en formato XML (que es el que SonarCloud entiende).
      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=ft_engineering --cov=model_monitoring \
            --cov-report=xml --cov-report=term

      # 5. Análisis con SonarCloud. El token se inyecta como variable de
      #    entorno desde los secrets del repositorio.
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
